<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل | سامانه تدبیر منزل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'vazir': ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        'primary': '#0f172a',
                        'secondary': '#3b82f6',
                        'accent': '#f59e0b',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-vazir bg-gray-50 min-h-screen">

    <!-- ===== هدر ===== -->
    <header class="glass-header sticky top-0 z-50 px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-user text-2xl text-secondary"></i>
                <h1 class="text-xl font-bold text-primary">پروفایل کاربری</h1>
            </div>
            <div class="hamburger-menu cursor-pointer" id="hamburgerMenu">
                <i class="fas fa-bars text-2xl text-gray-700"></i>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">

        <div class="card-modern p-6">

            <!-- ===== آواتار ===== -->
            <div class="flex flex-col items-center mb-6">
                <div class="relative">
                    <img id="avatarImg" src="" alt="avatar" class="w-28 h-28 rounded-full object-cover border-4 border-secondary">
                    <label for="avatarUpload" class="absolute bottom-0 right-0 bg-secondary text-white p-2 rounded-full cursor-pointer hover:bg-secondary/80 transition-colors">
                        <i class="fas fa-camera text-sm"></i>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/jpeg,image/png" class="hidden">
                </div>
                <p class="text-sm text-gray-500 mt-2">برای تغییر عکس کلیک کنید</p>
            </div>

            <!-- ===== اطلاعات ===== -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">نام کاربری</label>
                    <span id="usernameDisplay" class="block text-gray-900 font-medium mt-1"></span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">تاریخ عضویت</label>
                    <span id="registeredAtDisplay" class="block text-gray-900 font-medium mt-1"></span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">تعداد اعضای خانواده</label>
                    <input type="number" id="familySizeInput" class="input-modern" min="1" max="20">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">مدت ذخیره‌سازی پیش‌فرض (روز)</label>
                    <input type="number" id="storageDaysInput" class="input-modern" min="1" max="90">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ایمیل (اختیاری)</label>
                    <input type="email" id="emailInput" class="input-modern" placeholder="example@domain.com">
                </div>
            </div>

            <!-- ===== دکمه‌ها ===== -->
            <div class="mt-6 space-y-3">
                <button id="saveProfileBtn" class="btn-gradient w-full justify-center">
                    <i class="fas fa-save ml-2"></i> ذخیره تغییرات
                </button>
                <button id="backToDashboardBtn" class="btn-outline w-full justify-center">
                    <i class="fas fa-arrow-right ml-2"></i> بازگشت به داشبورد
                </button>
            </div>

            <div id="messageDiv" class="mt-4 text-center text-sm"></div>

        </div>

    </main>

    <!-- ===== منوی کشو ===== -->
    <div id="drawer" class="drawer-modern fixed top-0 right-0 w-72 h-full z-50 transform translate-x-full transition-transform duration-300 shadow-2xl p-4 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <span class="text-lg font-bold text-primary">منو</span>
            <button id="closeDrawerBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        <div id="drawerItems" class="space-y-2"></div>
    </div>
    <div id="drawerBackdrop" class="fixed inset-0 bg-black/30 z-40 hidden"></div>

    <script type="module" src="profile.js"></script>
</body>
</html>

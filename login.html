<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | سامانه مدیریت ذخایر</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e9f0f5 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 500;
            color: #4b5563;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #1e466e;
            border-bottom-color: #1e466e;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #1e466e;
            color: white;
            border: none;
            border-radius: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            font-size: 1rem;
        }
        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .success-msg {
            color: #16a34a;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="tabs">
            <div class="tab active" data-tab="login">ورود</div>
            <div class="tab" data-tab="register">ثبت‌نام</div>
        </div>

        <div id="loginForm" class="form-panel">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="loginUsername" placeholder="نام کاربری خود را وارد کنید">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="loginPassword" placeholder="رمز عبور">
            </div>
            <button id="doLogin">ورود</button>
            <div id="loginError" class="error-msg"></div>
        </div>

        <div id="registerForm" class="form-panel" style="display: none;">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="regUsername" placeholder="نام کاربری (حداقل ۳ کاراکتر)">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="regPassword" placeholder="رمز عبور (حداقل ۴ کاراکتر)">
            </div>
            <div class="form-group">
                <label>تکرار رمز عبور</label>
                <input type="password" id="regConfirm" placeholder="دوباره وارد کنید">
            </div>
            <button id="doRegister">ثبت‌نام</button>
            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
